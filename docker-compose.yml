services:
  crontab-ui:
    build: .
    image: alseambusher/crontab-ui
    ports:
      - "8000:8000"
    volumes:
      - crontab-data:/crontab-ui/crontabs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  crontab-data:
